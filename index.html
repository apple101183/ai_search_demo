<!DOCTYPE html>
<html lang="zh-TW">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>AI 課程語義搜尋</title>
  <style>
    * {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
    }

    body {
      font-family: 'Segoe UI', system-ui, -apple-system, sans-serif;
      background: #f0f2f5;
      color: #1a1a2e;
      min-height: 100vh;
    }

    /* ── Header ── */
    header {
      background: linear-gradient(135deg, #1a1a2e 0%, #16213e 60%, #0f3460 100%);
      padding: 48px 24px 56px;
      text-align: center;
      position: relative;
      overflow: hidden;
    }

    header::before {
      content: '';
      position: absolute;
      inset: 0;
      background: radial-gradient(ellipse at 50% 120%, rgba(82, 130, 255, 0.18) 0%, transparent 70%);
      pointer-events: none;
    }

    header h1 {
      font-size: 2rem;
      font-weight: 700;
      color: #fff;
      letter-spacing: -0.5px;
      margin-bottom: 6px;
    }

    header p {
      color: rgba(255, 255, 255, 0.55);
      font-size: 0.95rem;
    }

    /* ── Search bar ── */
    .search-wrap {
      max-width: 680px;
      margin: -28px auto 0;
      padding: 0 24px;
      position: relative;
      z-index: 10;
    }

    .search-box {
      display: flex;
      background: #fff;
      border-radius: 16px;
      box-shadow: 0 8px 32px rgba(0, 0, 0, 0.14);
      overflow: hidden;
      transition: box-shadow 0.2s;
    }

    .search-box:focus-within {
      box-shadow: 0 8px 40px rgba(82, 130, 255, 0.25);
    }

    #searchInput {
      flex: 1;
      border: none;
      outline: none;
      padding: 18px 20px;
      font-size: 1rem;
      color: #1a1a2e;
      background: transparent;
    }

    #searchInput::placeholder {
      color: #aab;
    }

    #searchBtn {
      border: none;
      background: linear-gradient(135deg, #5282ff, #3a5bd9);
      color: #fff;
      padding: 0 28px;
      font-size: 0.95rem;
      font-weight: 600;
      cursor: pointer;
      transition: opacity 0.15s, transform 0.1s;
      white-space: nowrap;
    }

    #searchBtn:hover  { opacity: 0.9; }
    #searchBtn:active { transform: scale(0.97); }
    #searchBtn:disabled { opacity: 0.6; cursor: default; }

    /* ── Main content ── */
    main {
      max-width: 900px;
      margin: 40px auto 60px;
      padding: 0 24px;
    }

    /* ── Status messages ── */
    .status {
      text-align: center;
      padding: 48px 0;
      display: none;
    }

    .status.visible { display: block; }

    /* Loading */
    .loader {
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 16px;
      color: #5282ff;
      font-weight: 500;
    }

    .spinner {
      width: 44px;
      height: 44px;
      border: 4px solid rgba(82, 130, 255, 0.2);
      border-top-color: #5282ff;
      border-radius: 50%;
      animation: spin 0.75s linear infinite;
    }

    @keyframes spin { to { transform: rotate(360deg); } }

    /* Empty / Error */
    .empty-icon {
      font-size: 3rem;
      margin-bottom: 12px;
    }

    .empty-text {
      color: #667;
      font-size: 1rem;
      line-height: 1.6;
    }

    /* ── Results meta ── */
    .results-meta {
      font-size: 0.85rem;
      color: #889;
      margin-bottom: 20px;
      display: none;
    }

    .results-meta.visible { display: block; }

    /* ── Cards grid ── */
    .cards {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(280px, 1fr));
      gap: 20px;
    }

    /* ── Card ── */
    .card {
      background: #fff;
      border-radius: 14px;
      padding: 22px 22px 18px;
      box-shadow: 0 2px 12px rgba(0, 0, 0, 0.07);
      display: flex;
      flex-direction: column;
      gap: 10px;
      transition: transform 0.18s, box-shadow 0.18s;
      position: relative;
      overflow: hidden;
    }

    .card::before {
      content: '';
      position: absolute;
      top: 0; left: 0; right: 0;
      height: 3px;
      background: linear-gradient(90deg, #5282ff, #a78bfa);
      opacity: 0;
      transition: opacity 0.18s;
    }

    .card:hover {
      transform: translateY(-3px);
      box-shadow: 0 8px 28px rgba(82, 130, 255, 0.15);
    }

    .card:hover::before { opacity: 1; }

    .card-title a {
      font-size: 1rem;
      font-weight: 700;
      color: #1a1a2e;
      text-decoration: none;
      line-height: 1.4;
      transition: color 0.15s;
    }

    .card-title a:hover { color: #5282ff; }

    .card-desc {
      font-size: 0.875rem;
      color: #556;
      line-height: 1.65;
      flex: 1;
      display: -webkit-box;
      -webkit-line-clamp: 4;
      -webkit-box-orient: vertical;
      overflow: hidden;
    }

    .card-footer {
      display: flex;
      align-items: center;
      justify-content: space-between;
      margin-top: 6px;
    }

    .score-badge {
      display: inline-flex;
      align-items: center;
      gap: 5px;
      font-size: 0.75rem;
      font-weight: 600;
      padding: 4px 10px;
      border-radius: 20px;
      background: #f0f4ff;
      color: #5282ff;
    }

    .score-badge .dot {
      width: 7px;
      height: 7px;
      border-radius: 50%;
      background: currentColor;
    }

    .score-high   { background: #edfaf3; color: #22c55e; }
    .score-medium { background: #fff8ec; color: #f59e0b; }
    .score-low    { background: #f3f3f3; color: #999; }

    .card-link {
      font-size: 0.8rem;
      color: #aab;
      text-decoration: none;
      transition: color 0.15s;
    }

    .card-link:hover { color: #5282ff; }
  </style>
</head>
<body>

<header>
  <h1>AI 課程語義搜尋</h1>
  <p>使用 BigQuery 向量搜尋，找到最相關的課程內容</p>
</header>

<div class="search-wrap">
  <div class="search-box">
    <input
      id="searchInput"
      type="text"
      placeholder="輸入任何主題，例如：Python 資料分析、機器學習入門..."
      autocomplete="off"
    />
    <button id="searchBtn">搜尋</button>
  </div>
</div>

<main>
  <div id="resultsMeta" class="results-meta"></div>

  <div id="statusLoading" class="status">
    <div class="loader">
      <div class="spinner"></div>
      <span>AI 正在語義搜尋中...</span>
    </div>
  </div>

  <div id="statusEmpty" class="status">
    <div class="empty-icon">🔍</div>
    <p class="empty-text">找不到相關課程，請嘗試其他關鍵字</p>
  </div>

  <div id="statusError" class="status">
    <div class="empty-icon">⚠️</div>
    <p class="empty-text" id="errorText">搜尋時發生錯誤，請稍後再試。</p>
  </div>

  <div id="cards" class="cards"></div>
</main>

<script>
  // ── 填入你的 GAS Web App 網址 ──────────────────────────────────────
  const GAS_API_URL = 'https://script.google.com/macros/s/AKfycbz21ICeSE6SUIo2QJyZvQZKpImmTdLUUsUuTUr8NpEtCjKQpZHhz3JJ4_0AW5YfDuov/exec';
  // ───────────────────────────────────────────────────────────────────

  const input    = document.getElementById('searchInput');
  const btn      = document.getElementById('searchBtn');
  const cards    = document.getElementById('cards');
  const meta     = document.getElementById('resultsMeta');
  const stLoad   = document.getElementById('statusLoading');
  const stEmpty  = document.getElementById('statusEmpty');
  const stError  = document.getElementById('statusError');
  const errText  = document.getElementById('errorText');

  function setStatus(state) {
    [stLoad, stEmpty, stError].forEach(el => el.classList.remove('visible'));
    if (state) document.getElementById('status' + state).classList.add('visible');
  }

  function scoreClass(score) {
    if (score >= 0.75) return 'score-high';
    if (score >= 0.5)  return 'score-medium';
    return 'score-low';
  }

  function renderCards(results) {
    cards.innerHTML = results.map(r => {
      const score   = typeof r.score === 'number' ? r.score : parseFloat(r.score) || 0;
      const pct     = (score * 100).toFixed(1);
      const cls     = scoreClass(score);
      const title   = r.title       || '（無標題）';
      const desc    = r.description || '（無說明）';
      const url     = r.video_url   || '#';

      return `
        <div class="card">
          <div class="card-title">
            <a href="${escHtml(url)}" target="_blank" rel="noopener">${escHtml(title)}</a>
          </div>
          <p class="card-desc">${escHtml(desc)}</p>
          <div class="card-footer">
            <span class="score-badge ${cls}">
              <span class="dot"></span>語義分數 ${pct}%
            </span>
            <a class="card-link" href="${escHtml(url)}" target="_blank" rel="noopener">觀看課程 →</a>
          </div>
        </div>
      `;
    }).join('');
  }

  function escHtml(str) {
    return String(str)
      .replace(/&/g, '&amp;')
      .replace(/</g, '&lt;')
      .replace(/>/g, '&gt;')
      .replace(/"/g, '&quot;');
  }

  async function doSearch() {
    const q = input.value.trim();
    if (!q) { input.focus(); return; }

    if (!GAS_API_URL) {
      errText.textContent = '請先在程式碼中填入 GAS_API_URL。';
      cards.innerHTML = '';
      meta.classList.remove('visible');
      setStatus('Error');
      return;
    }

    btn.disabled = true;
    cards.innerHTML = '';
    meta.classList.remove('visible');
    setStatus('Loading');

    const t0 = Date.now();

    try {
      const url  = `${GAS_API_URL}?q=${encodeURIComponent(q)}`;
      const resp = await fetch(url);

      if (!resp.ok) throw new Error(`HTTP ${resp.status}`);

      const data    = await resp.json();
      const results = Array.isArray(data.results) ? data.results : [];
      const elapsed = ((Date.now() - t0) / 1000).toFixed(2);

      setStatus(null);

      if (results.length === 0) {
        setStatus('Empty');
        return;
      }

      meta.textContent = `找到 ${results.length} 筆結果，耗時 ${elapsed} 秒`;
      meta.classList.add('visible');
      renderCards(results);

    } catch (err) {
      errText.textContent = `搜尋時發生錯誤：${err.message}`;
      setStatus('Error');
    } finally {
      btn.disabled = false;
    }
  }

  btn.addEventListener('click', doSearch);
  input.addEventListener('keydown', e => { if (e.key === 'Enter') doSearch(); });
</script>

</body>
</html>
